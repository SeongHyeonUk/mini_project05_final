version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
      nodejs: 20

  pre_build:
    commands:
      - chmod +x bookapp/gradlew
      - npm ci --prefix frontend

  build:
    commands:
      - ./bookapp/gradlew -p bookapp clean bootJar --no-daemon
      - npm run build --prefix frontend

  post_build:
    commands:
      - test -f appspec.yml
      - test -d frontend/dist
      - test -n "$(find bookapp/build/libs -name '*.jar' -print -quit)"

artifacts:
  files:
    - appspec.yml
    - deploy-scripts/**/*
    - bookapp/build/libs/*.jar
    - frontend/dist/**/*
  discard-paths: no

cache:
  paths:
    - /root/.gradle/caches/**/*
    - /root/.npm/**/*
