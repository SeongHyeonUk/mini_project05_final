version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
      nodejs: 20

  pre_build:
    commands:
      - chmod +x bookapp/gradlew
      - npm ci --prefix frontend
  
  build:
    commands:
      - ./bookapp/gradlew -p bookapp clean build --no-daemon
      - npm run build --prefix frontend

  post_build:
    commands:
      - ls -la bookapp/build/libs
      - ls -la frontend/dist

artifacts:
  files:
    - bookapp/build/libs/*.jar
    - frontend/dist/**/*
  discard-paths: no

cache:
  paths:
    - /root/.gradle/caches/**/*
    - /root/.npm/**/*