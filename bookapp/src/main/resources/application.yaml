spring:
  application:
    name: bookapp

  datasource:
    # 환경변수로 덮어쓸 수 있고, 없으면 localhost:3306 / root 기본값 사용
    # createDatabaseIfNotExist=true → bookapp DB가 없으면 자동 생성
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bookapp}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      # 엔티티 기준으로 테이블 자동 생성/갱신 → 데이터 영속(자동 저장)
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# CORS 허용 Origin (콤마 구분). 운영에서는 CORS_ALLOWED_ORIGINS 로 프론트 주소 지정.
# 예) CORS_ALLOWED_ORIGINS=http://13.124.xx.xx,https://chaekdam.com
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}
